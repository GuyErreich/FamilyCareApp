version: '3'

vars:
  WEB_DIR: web

tasks:
  web:install:
    desc: Install web app npm dependencies
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm install

  web:dev:
    desc: Run Vite dev server
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run dev

  web:build:
    desc: Production build to web/dist
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run build

  web:test:
    desc: Run Vitest unit tests
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run test

  web:lint:
    desc: ESLint for web app
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run lint

  web:check:
    desc: Lint, test, and build web app
    cmds:
      - task: web:lint
      - task: web:test
      - task: web:build

  supabase:start:
    desc: Start local Supabase stack
    cmds:
      - supabase start

  supabase:stop:
    desc: Stop local Supabase stack
    cmds:
      - supabase stop

  deploy:pages:
    desc: Deploy web/dist to Cloudflare Pages
    deps: [web:build]
    cmds:
      - npx wrangler pages deploy web/dist

  all:
    desc: Full web check (lint, test, build)
    cmds:
      - task: web:check
