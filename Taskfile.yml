version: '3'

vars:
  WEB_DIR: web

tasks:
  web:install:
    desc: Install web app npm dependencies
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm install

  web:dev:
    desc: Run Vite dev server
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run dev

  web:build:
    desc: Production build to web/dist
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run build

  web:test:
    desc: Run Vitest unit tests
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run test

  web:lint:
    desc: ESLint for web app
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run lint

  web:check:
    desc: Lint, test, and build web app
    cmds:
      - task: web:lint
      - task: web:test
      - task: web:build

  supabase:start:
    desc: Start local Supabase stack
    cmds:
      - supabase start

  supabase:stop:
    desc: Stop local Supabase stack
    cmds:
      - supabase stop

  supabase:linked:
    desc: Show whether CLI is linked to a hosted project
    cmds:
      - |
        if [ -f supabase/.temp/project-ref ]; then
          echo "Linked project ref: $(cat supabase/.temp/project-ref)"
        else
          echo "Not linked. Run: supabase link --project-ref <ref>"
          echo "See docs/supabase-hosted.md"
          exit 1
        fi

  supabase:push:
    desc: Push migrations to the linked hosted project
    cmds:
      - supabase db push

  supabase:push:dry-run:
    desc: Show migrations that would be pushed to hosted project
    cmds:
      - supabase db push --dry-run

  supabase:functions:deploy:
    desc: Deploy Edge Functions to the linked hosted project
    cmds:
      - supabase functions deploy on-shift-change

  supabase:auth:google:
    desc: Sync Google OAuth from supabase/.env to linked hosted project (config push)
    cmds:
      - bash scripts/supabase-auth-google.sh

  supabase:auth:google:local:
    desc: Restart local Supabase after supabase/.env Google credential changes
    cmds:
      - LOCAL=1 bash scripts/supabase-auth-google.sh

  deploy:pages:
    desc: Deploy web/dist to Cloudflare Pages
    deps: [web:build]
    cmds:
      - npx wrangler pages deploy web/dist

  all:
    desc: Full web check (lint, test, build)
    cmds:
      - task: web:check
