name: family_care_scheduler
description: Coordinate family companion shifts for Grandpa with scheduling, reminders, and Google Calendar sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.3.0
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
